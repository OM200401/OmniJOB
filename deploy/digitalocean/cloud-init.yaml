#cloud-config
# Bootstrap for the OmniJob DigitalOcean droplet. Provisions a clean
# Ubuntu 22.04 box into a runnable state in ~4-5 minutes from
# `doctl compute droplet create`.
#
# Customize: replace the GitHub URL if your fork lives elsewhere.

users:
  - name: om
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: [docker]
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEXcJV5gQRGMqgXOjUQu1H/UiCPABguNRX9abkKDBCFs ommistry012004@gmail.com

package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - git
  - gnupg
  - lsb-release
  - unzip
  - jq
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https
  - awscli

write_files:
  # Pin Docker daemon DNS to public resolvers. Without this, containers
  # inherit the host's systemd-resolved stub (127.0.0.53) which is unreachable
  # from container netns - manifests as "network is unreachable" on first
  # outbound DNS lookup. Must land before docker installs so the daemon
  # picks it up on first start.
  - path: /etc/docker/daemon.json
    permissions: "0644"
    content: |
      {"dns": ["8.8.8.8", "1.1.1.1"]}

  - path: /etc/caddy/Caddyfile
    permissions: "0644"
    content: |
      # Replaced after first boot by `cp deploy/Caddyfile`.
      :80 { respond "OmniJob bootstrap - Caddyfile not yet copied" }

runcmd:
  # Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # Caddy. Pre-create the system user explicitly because the package's
  # postinst occasionally exits cleanly without creating it under cloud-init,
  # and the resulting unit file then dies with status=217/USER on first start.
  - id caddy >/dev/null 2>&1 || useradd --system --home /var/lib/caddy --create-home --shell /usr/sbin/nologin --comment "Caddy" caddy
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  - curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
  - apt-get update
  - apt-get install -y caddy

  # Go: install from official tarball at /usr/local/go (matches the
  # systemd unit's ExecStart path). apt's golang-go is 1.18 on Ubuntu
  # 22.04, too old for the crawler's go.mod (requires 1.23+).
  - curl -fLsS -o /tmp/go.tgz https://go.dev/dl/go1.24.4.linux-amd64.tar.gz
  - rm -rf /usr/local/go
  - tar -C /usr/local -xzf /tmp/go.tgz
  - rm /tmp/go.tgz

  # Bun (as the om user)
  - sudo -u om bash -c 'curl -fsSL https://bun.sh/install | bash'

  # Repo + first compose up. Use bash explicitly for brace expansion in mkdir.
  - sudo -u om git clone https://github.com/OM200401/OmniJOB.git /home/om/omnijob
  - bash -c 'mkdir -p /var/lib/omnijob/{qdrant,redis,ollama,backups}'
  - chown -R om:om /var/lib/omnijob
  - sudo -u om touch /var/lib/omnijob/users.db
  - cd /home/om/omnijob && docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d

  # API dependencies and DB schemas. Without these the API exits on first
  # boot with "Cannot find module @sinclair/typebox" or "no such table: users".
  - sudo -u om bash -c 'cd /home/om/omnijob/apps/api && /home/om/.bun/bin/bun install'
  - sudo -u om SQLITE_PATH=/var/lib/omnijob/users.db bash -c 'cd /home/om/omnijob/apps/api && /home/om/.bun/bin/bun run scripts/init-sqlite.ts'

  # Crawler module deps: pre-fetch so the systemd 'go run' doesn't have
  # to do it on every timer fire. Costs ~150 MB once, saves a network
  # roundtrip per crawl.
  - sudo -u om bash -c 'cd /home/om/omnijob/apps/crawler && /usr/local/go/bin/go mod download'

  # Pull the embedding model. Wait for ollama to be reachable on its mapped
  # host port before exec-ing into the container.
  - bash -c 'for i in $(seq 1 60); do curl -sf http://localhost:11434/api/tags >/dev/null && break; sleep 2; done'
  - docker exec omnijob-ollama ollama pull nomic-embed-text
  - sudo -u om QDRANT_URL=http://localhost:6333 bash -c 'cd /home/om/omnijob/apps/api && /home/om/.bun/bin/bun run scripts/init-qdrant.ts'

  # API + crawler systemd units (shared across providers)
  - cp /home/om/omnijob/deploy/systemd/*.service /etc/systemd/system/
  - cp /home/om/omnijob/deploy/systemd/*.timer /etc/systemd/system/
  - systemctl daemon-reload
  - systemctl enable --now omnijob-api.service
  - systemctl enable --now omnijob-crawler.timer

  # Backup cron (root crontab; the script runs as om via su -c).
  - echo "0 3 * * * om cd /home/om/omnijob && /home/om/.bun/bin/bun run apps/api/scripts/backup.ts >> /var/log/omnijob-backup.log 2>&1" > /etc/cron.d/omnijob-backup
  - chmod 644 /etc/cron.d/omnijob-backup

  # Caddy: copy the real Caddyfile and reload (shared across providers).
  # Note: deploy/Caddyfile is hardcoded to omnijob.tech; if your domain
  # differs, sed-replace it before copying or fork a per-domain Caddyfile.
  - cp /home/om/omnijob/deploy/Caddyfile /etc/caddy/Caddyfile
  - systemctl reload caddy
  - echo "OmniJob bootstrap complete at $(date -u)" > /var/log/omnijob-bootstrap.log
