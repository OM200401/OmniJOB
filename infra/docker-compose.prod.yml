# Production overlay applied on top of docker-compose.yml on the deploy host.
# Run as:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# Differences from the dev compose:
#   - All ports bind only to 127.0.0.1 (Caddy is the single public entrypoint).
#   - Named volumes get host bind-mounts under /var/lib/omnijob so the
#     backup script can read snapshots and SQLite directly off disk.
#   - Hard memory ceilings on every container so a runaway query can't OOM
#     the whole VM. B2s has 4 GB total - Bun + system overhead consumes ~1 GB,
#     leaving ~3 GB to split between Qdrant (1G), Ollama (2G), Redis (256M).

services:
  qdrant:
    # Ports come from the base compose (127.0.0.1-bound). Don't re-declare
    # here - compose merges port lists and produces duplicate bindings.
    volumes:
      - /var/lib/omnijob/qdrant:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    volumes:
      - /var/lib/omnijob/redis:/data
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    volumes:
      - /var/lib/omnijob/ollama:/root/.ollama
    # Ollama benefits from CPU pinning on B-series; let it use both vCPU
    # but cap memory so the API process always has headroom.
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Override the dev volume entries so docker-compose doesn't auto-create them.
volumes:
  qdrant_data:
    external: true
    name: noop_qdrant
  redis_data:
    external: true
    name: noop_redis
  ollama_models:
    external: true
    name: noop_ollama
