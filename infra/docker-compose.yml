services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: omnijob-qdrant
    restart: unless-stopped
    # Localhost-only by default. Caddy (or `localhost` browser tabs in dev)
    # is the single entry point. Production overlay does not re-declare
    # these - that produced duplicate bindings that silently failed.
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnijob-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: omnijob-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    # Runtime tuning for the batched embed workload. We send up to 64 inputs
    # per /api/embed call from the crawler/API; Ollama should treat itself
    # as a single-tenant single-model server and lean on flash attention.
    #   OLLAMA_KEEP_ALIVE=-1        keep nomic-embed-text resident forever
    #                               (no cold-start penalty between bursts).
    #   OLLAMA_MAX_LOADED_MODELS=1  we only ever serve one model; reject
    #                               accidental fan-outs that would thrash RAM.
    #   OLLAMA_FLASH_ATTENTION=1    safe and faster for embed-class models.
    #   OLLAMA_NUM_PARALLEL=1       client-side batching already saturates
    #                               the GPU; server-side parallelism would
    #                               just multiply memory at our concurrency.
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_NUM_PARALLEL: "1"
    # Model cache lives on a named volume so nomic-embed-text (~275 MB)
    # survives container restarts. Pulled once via:
    #   docker exec omnijob-ollama ollama pull nomic-embed-text
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  qdrant_data:
  redis_data:
  ollama_models:
